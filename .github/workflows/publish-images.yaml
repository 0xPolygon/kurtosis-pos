name: publish-images

# Workflow to build and publish docker images to GHCR.
on:
  # Manual trigger (for publishing)
  workflow_dispatch:
    inputs:
      image:
        description: Which image(s) to build and publish
        required: true
        type: choice
        default: all
        options:
          - all
          - pos-contract-deployer
          - pos-el-genesis-builder
          - pos-validator-config-generator

concurrency:
  group: publish-images
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

  # pos-contract-deployer settings
  POS_CONTRACTS_IMAGE_NAME: 0xPolygon/pos-contract-deployer
  POS_CONTRACT_DEPLOYER_VERSION: 0.0.4
  # pos-contracts (anvil-pos) - 2025-08-01 — bridge contracts, MATIC→POL migration
  POS_CONTRACTS_ANVIL_POS_BRANCH: anvil-pos
  POS_CONTRACTS_ANVIL_POS_COMMIT_SHA: d96d5929
  # pos-contracts (main) - 2026-03-12 — only the upgraded ValidatorShare
  # implementation. See upgrade-validator-share.sh for context.
  POS_CONTRACTS_MAIN_BRANCH: main
  POS_CONTRACTS_MAIN_COMMIT_SHA: 935dee17
  # pos-portal - 2025-10-24
  POS_PORTAL_BRANCH: master
  POS_PORTAL_COMMIT_SHA: 3402faa
  # spol-contracts - 2026-04-16
  SPOL_CONTRACTS_BRANCH: main
  SPOL_CONTRACTS_COMMIT_SHA: 3c4bdf6c

  # pos-el-genesis-builder settings
  EL_GENESIS_BUILDER_IMAGE_NAME: 0xPolygon/pos-el-genesis-builder
  # genesis-contracts - 2025¬01¬08
  GENESIS_CONTRACTS_BRANCH: master
  GENESIS_CONTRACTS_COMMIT_SHA: 96a19dd

  # pos-validator-config-generator settings
  VALIDATOR_CONFIG_IMAGE_NAME: 0xPolygon/pos-validator-config-generator
  HEIMDALL_V2_VERSION: 0.7.1
  POLYGON_CLI_VERSION: v0.1.111

jobs:
  publish-pos-contract-deployer:
    # Run on PR/push (inputs.image doesn't exist), OR on manual trigger if selected
    if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == 'pos-contract-deployer'
    environment: publish-images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag with the deployer's own semver, since the image now bundles multiple
      # upstream repos (pos-contracts + pos-portal + spol-contracts) — no single
      # commit SHA fits.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.POS_CONTRACTS_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.POS_CONTRACT_DEPLOYER_VERSION }}
          labels: |
            org.opencontainers.image.version=${{ env.POS_CONTRACT_DEPLOYER_VERSION }}
            com.polygon.pos-contracts-anvil-pos.branch=${{ env.POS_CONTRACTS_ANVIL_POS_BRANCH }}
            com.polygon.pos-contracts-anvil-pos.commit=${{ env.POS_CONTRACTS_ANVIL_POS_COMMIT_SHA }}
            com.polygon.pos-contracts-main.branch=${{ env.POS_CONTRACTS_MAIN_BRANCH }}
            com.polygon.pos-contracts-main.commit=${{ env.POS_CONTRACTS_MAIN_COMMIT_SHA }}
            com.polygon.pos-portal.branch=${{ env.POS_PORTAL_BRANCH }}
            com.polygon.pos-portal.commit=${{ env.POS_PORTAL_COMMIT_SHA }}
            com.polygon.spol-contracts.branch=${{ env.SPOL_CONTRACTS_BRANCH }}
            com.polygon.spol-contracts.commit=${{ env.SPOL_CONTRACTS_COMMIT_SHA }}

      - name: Build and push docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/pos-contract-deployer.Dockerfile
          build-args: |
            POS_CONTRACTS_ANVIL_POS_BRANCH=${{ env.POS_CONTRACTS_ANVIL_POS_BRANCH }}
            POS_CONTRACTS_ANVIL_POS_TAG_OR_COMMIT_SHA=${{ env.POS_CONTRACTS_ANVIL_POS_COMMIT_SHA }}
            POS_CONTRACTS_MAIN_BRANCH=${{ env.POS_CONTRACTS_MAIN_BRANCH }}
            POS_CONTRACTS_MAIN_TAG_OR_COMMIT_SHA=${{ env.POS_CONTRACTS_MAIN_COMMIT_SHA }}
            POS_PORTAL_BRANCH=${{ env.POS_PORTAL_BRANCH }}
            POS_PORTAL_TAG_OR_COMMIT_SHA=${{ env.POS_PORTAL_COMMIT_SHA }}
            SPOL_CONTRACTS_BRANCH=${{ env.SPOL_CONTRACTS_BRANCH }}
            SPOL_CONTRACTS_TAG_OR_COMMIT_SHA=${{ env.SPOL_CONTRACTS_COMMIT_SHA }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.POS_CONTRACTS_IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-pos-el-genesis-builder:
    # Run on PR/push (inputs.image doesn't exist), OR on manual trigger if selected
    if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == 'pos-el-genesis-builder'
    environment: publish-images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag images with the specific genesis-contracts commit SHA for version control.
      # This ensures reproducible builds tied to a specific contracts version.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.EL_GENESIS_BUILDER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.GENESIS_CONTRACTS_COMMIT_SHA }}

      - name: Build and push docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: docker
          file: docker/pos-el-genesis-builder.Dockerfile
          build-args: |
            GENESIS_CONTRACTS_BRANCH=${{ env.GENESIS_CONTRACTS_BRANCH }}
            GENESIS_CONTRACTS_TAG_OR_COMMIT_SHA=${{ env.GENESIS_CONTRACTS_COMMIT_SHA }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.EL_GENESIS_BUILDER_IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-pos-validator-config-generator:
    # Run on PR/push (inputs.image doesn't exist), OR on manual trigger if selected
    if: github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == 'pos-validator-config-generator'
    environment: publish-images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag images with the Heimdall v2 version for version control.
      # This ensures reproducible builds tied to a specific Heimdall version.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.VALIDATOR_CONFIG_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.HEIMDALL_V2_VERSION }}

      - name: Build and push docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: docker
          file: docker/pos-validator-config-generator.Dockerfile
          build-args: |
            HEIMDALL_V2_VERSION=${{ env.HEIMDALL_V2_VERSION }}
            POLYGON_CLI_VERSION=${{ env.POLYGON_CLI_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.VALIDATOR_CONFIG_IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
