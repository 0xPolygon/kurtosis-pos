name: checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KURTOSIS_VERSION: 1.18.2

    steps:
      - uses: actions/checkout@v6

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://sdk.kurtosis.com/kurtosis-cli-release-artifacts/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli=${{ env.KURTOSIS_VERSION }}
          kurtosis analytics disable

      - name: Run kurtosis linter
        run: kurtosis lint .
      
      - name: Run markdown linter
        uses: rvben/rumdl@f8bdeb6a73c5f0741b58c25da2d38af5ee21b6e0 # v0.1.87

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@bbaefadf97b0ec5fdc942684b647f1a6ab250274 # v1.46.0

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KURTOSIS_TEST_VERSION: v0.0.6
      GO_VERSION: 1.23 # required by kurtosis-test v0.0.6

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install kurtosis-test
        run: |
          git clone --branch ${{ env.KURTOSIS_TEST_VERSION }} https://github.com/ethereum-optimism/kurtosis-test.git /tmp/kurtosis-test
          cd /tmp/kurtosis-test
          go build -o kurtosis-test cli/main.go
          sudo cp kurtosis-test /usr/local/bin

      - name: Run unit tests
        run: kurtosis-test .

  devnet-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: tools/devnet-monitor/go.mod
          cache-dependency-path: tools/devnet-monitor/go.sum

      - name: go vet
        working-directory: tools/devnet-monitor
        run: go vet ./...

      - name: go test
        working-directory: tools/devnet-monitor
        run: go test ./...
