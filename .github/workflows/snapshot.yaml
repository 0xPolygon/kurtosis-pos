name: snapshot

# Build snapshot images for each devnet variant and validate them end-to-end.
# Publish to GHCR on a successful tag push.
on:
  schedule:
    - cron: 0 6 * * * # 6 AM UTC every day.
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  snapshot:
    runs-on: ${{ matrix.devnet_type == 'large' && 'ubuntu-latest-8-cores' || 'ubuntu-latest' }}
    # Hard-pin to the canonical org so a fork of this public repo can never
    # schedule a job on `0xPolygon`'s billable larger runners. The trigger
    # set above already excludes `pull_request` from forks, but this guards
    # against a future trigger addition that would otherwise expose the
    # larger runner (and its docker/gcp secrets) to attacker-controlled
    # workflow files.
    if: github.repository == '0xPolygon/kurtosis-pos'
    timeout-minutes: 60

    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - devnet_type: small
          - devnet_type: large
            extra_flags: --args-file .github/configs/large.yml.norun

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/kurtosis/setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy devnet
        run: |
          ./scripts/perf/measure.sh start deploy
          kurtosis run --enclave=${{ env.ENCLAVE_NAME }} ${{ matrix.extra_flags }} .
          ./scripts/perf/measure.sh end deploy --extra flavour=${{ matrix.devnet_type }}

      - name: Create snapshot
        run: |
          ./scripts/perf/measure.sh start snapshot-build
          ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}
          ./scripts/perf/measure.sh end snapshot-build --extra flavour=${{ matrix.devnet_type }}

      - name: Verify snapshot image exists
        run: docker image inspect pos-devnet

      - name: Record snapshot image size
        run: |
          size=$(docker image inspect pos-devnet --format '{{.Size}}')
          digest=$(docker image inspect pos-devnet --format '{{.Id}}')
          ./scripts/perf/measure.sh emit snapshot-image-size \
            --extra bytes=$size \
            --extra digest=$digest \
            --extra flavour=${{ matrix.devnet_type }}

      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: |
          ./scripts/perf/measure.sh start restore
          ./scripts/snapshot/restore.sh
          ./scripts/perf/measure.sh end restore --extra flavour=${{ matrix.devnet_type }}

      - uses: ./.github/actions/monitor
        with:
          enclave_name: restored
          compose_file: ${{ github.workspace }}/tmp/docker-compose.yaml

      - uses: ./.github/actions/test/bridge
        with:
          enclave_name: restored
          compose_file: ${{ github.workspace }}/tmp/docker-compose.yaml
          pos_e2e_token: ${{ secrets.GH_TOKEN_POS_E2E_READ }}

      - uses: ./.github/actions/perf/collect
        if: always()
        with:
          job_id: snapshot-${{ matrix.devnet_type }}
          flavour: ${{ matrix.devnet_type }}

      - name: Push snapshot image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/0xpolygon/pos-devnet-${{ matrix.devnet_type }}:${{ github.ref_name }}"
          docker tag pos-devnet "$image"
          docker push "$image"
