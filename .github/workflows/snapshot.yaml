name: snapshot

on:
  schedule:
    - cron: 0 6 * * * # Run this workflow every day at 6 AM Paris time (UTC).
  workflow_dispatch:

# Permissions required to pull images from GAR
permissions:
  contents: read
  actions: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - name: Deploy devnet
        run: kurtosis run --enclave=${{ env.ENCLAVE_NAME }} --args-file=.github/configs/large.yml.norun .

      - name: Create snapshot
        run: ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}

      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: ./scripts/snapshot/restore.sh

      - name: Verify restored devnet produces blocks
        run: |
          target_block=$((256+100)) # 100 blocks after the snapshot block
          num_steps=50
          for step in $(seq 1 $num_steps); do
            echo "Check $step/$num_steps"
            all_ready=true
            while IFS= read -r container; do
              port=$(docker port "$container" 8545 | cut -d: -f2)
              block=$(cast bn --rpc-url localhost:$port)
              if [[ "$block" -lt "$target_block" ]]; then
                echo "- $container: $block/$target_block - NOT READY"
                all_ready=false
              else
                echo "- $container: $block/$target_block - OK"
              fi
            done < <(docker ps --filter "network=${{ env.ENCLAVE_NAME }}" --format "{{.Names}}" | grep l2-el | sort)
            if $all_ready; then
              echo "All L2 RPCs reached block $target_block"
              exit 0
            fi
            echo "Not all L2 RPCs reached block $target_block, retrying in 10s..."
            sleep 10
          done
          echo "Not all L2 RPCs reached block $target_block after $num_steps steps"
          exit 1
