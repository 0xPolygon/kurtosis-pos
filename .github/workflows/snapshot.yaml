name: snapshot

# Build snapshot images for each devnet variant and validate them end-to-end.
# Publish to GHCR on a successful tag push.
on:
  schedule:
    - cron: 0 6 * * * # 6 AM UTC every day.
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - devnet_type: small
          - devnet_type: large
            extra_flags: --args-file .github/configs/large.yml.norun

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/kurtosis-setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy devnet
        run: kurtosis run --enclave=${{ env.ENCLAVE_NAME }} ${{ matrix.extra_flags }} .

      - name: Create snapshot
        run: ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}

      - name: Verify snapshot image exists
        run: docker image inspect pos-devnet

      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: ./scripts/snapshot/restore.sh

      - uses: ./.github/actions/monitor
        with:
          enclave_name: restored
          compose_file: ${{ github.workspace }}/tmp/docker-compose.yaml

      - uses: ./.github/actions/test-state-sync
        with:
          enclave_name: restored
          compose_file: ${{ github.workspace }}/tmp/docker-compose.yaml
          pos_e2e_token: ${{ secrets.GH_TOKEN_POS_E2E_READ }}

      - name: Push snapshot image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/0xpolygon/pos-devnet-${{ matrix.devnet_type }}:${{ github.ref_name }}"
          docker tag pos-devnet "$image"
          docker push "$image"
