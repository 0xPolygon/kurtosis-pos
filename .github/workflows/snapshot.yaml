name: snapshot

# Build snapshot images for each devnet variant and validate them end-to-end.
# Publish to GHCR on a successful tag push.
on:
  schedule:
    - cron: 0 6 * * * # 6 AM UTC every day.
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      actions: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - devnet_type: small
          - devnet_type: large
            extra_flags: --args-file .github/configs/large.yml.norun

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy devnet
        run: kurtosis run --enclave=${{ env.ENCLAVE_NAME }} ${{ matrix.extra_flags }} .

      - name: Create snapshot
        run: ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}

      - name: Verify snapshot image exists
        run: docker image inspect pos-devnet

      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: ./scripts/snapshot/restore.sh

      - name: Verify devnet produces blocks and all nodes are in sync
        run: |
          target_block=500
          mapfile -t entries < <(yq -r '.services | to_entries[] | select(.key | test("-l2-el-[0-9]+-")) | "\(.value.ports[0] | split(":") | .[0]) \(.key)"' ./tmp/docker-compose.yaml | sort -n)
          echo "Polling ${#entries[@]} L2 EL endpoints:"
          for e in "${entries[@]}"; do echo "  $e"; done
          while true; do
            all_ready=true
            for e in "${entries[@]}"; do
              port="${e%% *}"
              name="${e#* }"
              block=$(cast bn --rpc-url "localhost:${port}" 2>/dev/null || echo 0)
              echo "  ${name} (:${port}): ${block}/${target_block}"
              if [[ "${block}" -lt "${target_block}" ]]; then
                all_ready=false
              fi
            done
            if ${all_ready}; then
              echo "All L2 EL nodes reached block ${target_block}"
              break
            fi
            sleep 5
          done

      # Withdraw tests need a fresh checkpoint on L1 to assemble the exit
      # payload. Block production alone isn't enough — heimdall→L1
      # checkpoint submission has its own restore-time hazards (rabbitmq
      # task staleness, proposer rotation). Wait for ack_count and
      # milestone count to advance past their post-restore baseline before
      # running the bridge tests so we fail fast and clearly here, not
      # 10 minutes into a withdraw test that has no chance.
      - name: Verify heimdall produces milestones and checkpoints
        run: |
          api="http://localhost:$(yq -r '.services | to_entries[] | select(.key | test("-l2-cl-1-heimdall-v2-bor-validator$")) | .value.ports[0]' ./tmp/docker-compose.yaml | cut -d: -f1)"
          baseline_milestones=$(curl -sf "$api/milestones/count" | jq -r '.count // 0')
          baseline_checkpoints=$(curl -sf "$api/checkpoints/count" | jq -r '.ack_count // 0')
          target_milestones=$((baseline_milestones + 1))
          target_checkpoints=$((baseline_checkpoints + 1))
          echo "Baseline:    milestones=${baseline_milestones} checkpoints=${baseline_checkpoints}"
          echo "Target:      milestones=${target_milestones} checkpoints=${target_checkpoints}"
          # Checkpoint cadence is ~2 minutes; 15 min covers cold-start + a
          # rotation if the first proposer slot misses.
          deadline=$(( $(date +%s) + 900 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            m=$(curl -sf "$api/milestones/count" | jq -r '.count // 0')
            c=$(curl -sf "$api/checkpoints/count" | jq -r '.ack_count // 0')
            echo "  milestones=${m}/${target_milestones} checkpoints=${c}/${target_checkpoints}"
            if [[ "$m" -ge "$target_milestones" && "$c" -ge "$target_checkpoints" ]]; then
              echo "Heimdall is producing milestones and checkpoints"
              exit 0
            fi
            sleep 30
          done
          echo "::error::milestones or checkpoints did not advance within timeout"
          exit 1

      - name: Run ETH bridge + withdraw tests against the restored devnet
        uses: ./.github/actions/test-docker-devnet
        with:
          pos_e2e_token: ${{ secrets.GH_TOKEN_POS_E2E_READ }}

      - name: Push snapshot image to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/0xpolygon/pos-devnet-${{ matrix.devnet_type }}:${{ github.ref_name }}"
          docker tag pos-devnet "$image"
          docker push "$image"
