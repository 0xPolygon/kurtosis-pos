name: publish-snapshots

# Build snapshot images for each devnet variant, validate end-to-end (extract +
# restore + chain advances), then push to GHCR. Triggered on tag pushes (`v*`)
# or via manual dispatch with a custom tag for testing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to test the workflow
        required: false
        default: vx.y.z-test

concurrency:
  group: publish-snapshots
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: 0xpolygon/pos-devnet-small
          - image_name: 0xpolygon/pos-devnet-large
            extra_flags: --args-file .github/configs/large.yml.norun

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy devnet
        run: kurtosis run --enclave=${{ env.ENCLAVE_NAME }} ${{ matrix.extra_flags }} .

      - name: Create snapshot
        run: ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}

      - name: Verify snapshot image exists
        run: docker image inspect pos-devnet

      # Validate the snapshot end-to-end before publishing so a broken snapshot
      # never ships. Tear down the live enclave, extract the image, restore, and
      # confirm the restored devnet produces blocks.
      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: ./scripts/snapshot/restore.sh

      - name: Verify devnet produces blocks and all nodes are in sync
        run: |
          target_block=500
          # Discover every L2 EL service + its host-mapped port. Service names
          # encode role (validator/rpc/archive) and client (bor/erigon).
          mapfile -t entries < <(yq -r '.services | to_entries[] | select(.key | test("-l2-el-[0-9]+-")) | "\(.value.ports[0] | split(":") | .[0]) \(.key)"' ./tmp/docker-compose.yaml | sort -n)
          echo "Polling ${#entries[@]} L2 EL endpoints:"
          for e in "${entries[@]}"; do echo "  $e"; done
          while true; do
            all_ready=true
            for e in "${entries[@]}"; do
              port="${e%% *}"
              name="${e#* }"
              block=$(cast bn --rpc-url "localhost:${port}" 2>/dev/null || echo 0)
              echo "  ${name} (:${port}): ${block}/${target_block}"
              if [[ "${block}" -lt "${target_block}" ]]; then
                all_ready=false
              fi
            done
            if ${all_ready}; then
              echo "All L2 EL nodes reached block ${target_block}"
              break
            fi
            sleep 5
          done

      # Run the ETH bridge + withdraw bats subset against the restored devnet.
      # This catches any restore-time corruption that would break L1↔L2 flows
      # — strictly stronger than the block-height check above. We pre-export
      # every env var pos_setup would otherwise resolve via `kurtosis port print`
      # / `kurtosis files inspect` (kurtosis is gone post-restore), pointing at
      # the host-mapped ports and the address artifacts shipped in the snapshot.
      - name: Clone 0xPolygon/pos-e2e
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/pos-e2e
          path: pos-e2e
          ref: 036860c4ff5d39c52f147a28c4045d9b4f0dc1ff
          token: ${{ secrets.GH_TOKEN_POS_E2E_READ }}

      - name: Install bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          support-path: ${{ github.workspace }}/lib/bats-support
          assert-path: ${{ github.workspace }}/lib/bats-assert
          detik-path: ${{ github.workspace }}/lib/bats-detik
          file-path: ${{ github.workspace }}/lib/bats-file

      - name: Install polygon-cli
        run: |
          pushd $(mktemp -d)
          curl -sL "https://github.com/0xPolygon/polygon-cli/releases/download/v0.1.111/polycli_v0.1.111_linux_amd64.tar.gz" \
            | tar xz
          sudo mv polycli_* /usr/local/bin/polycli
          polycli version
          popd

      - name: Run ETH bridge + withdraw tests
        working-directory: pos-e2e
        env:
          TIMEOUT_SECONDS: 600
          # Disable kurtosis-based discovery in pos_setup — kurtosis is gone after restore.
          ENCLAVE_NAME: restored
        run: |
          set -e
          compose=${{ github.workspace }}/tmp/docker-compose.yaml
          addrs=${{ github.workspace }}/tmp/contractAddresses.json
          genesis=${{ github.workspace }}/tmp/l2-genesis.json
          # Resolve host-mapped ports from the restored compose file.
          l1_port=$(yq -r '.services | to_entries[] | select(.key | test("-el-1-geth-lighthouse$")) | .value.ports[0]' "$compose" | cut -d: -f1)
          l2_port=$(yq -r '.services | to_entries[] | select(.key | test("-l2-el-1-bor-heimdall-v2-validator$")) | .value.ports[0]' "$compose" | cut -d: -f1)
          l2_cl_port=$(yq -r '.services | to_entries[] | select(.key | test("-l2-cl-1-heimdall-v2-bor-validator$")) | .value.ports[0]' "$compose" | cut -d: -f1)
          export L1_RPC_URL="http://localhost:${l1_port}"
          export L2_RPC_URL="http://localhost:${l2_port}"
          export L2_CL_API_URL="http://localhost:${l2_cl_port}"
          # Pull every contract address pos_setup would normally fetch from
          # the kurtosis 'pos-contract-addresses' artifact.
          export L1_GOVERNANCE_PROXY_ADDRESS=$(jq -r '.root.GovernanceProxy' "$addrs")
          export L1_ROOT_CHAIN_PROXY_ADDRESS=$(jq -r '.root.RootChainProxy' "$addrs")
          export L1_DEPOSIT_MANAGER_PROXY_ADDRESS=$(jq -r '.root.DepositManagerProxy' "$addrs")
          export L1_WITHDRAW_MANAGER_PROXY_ADDRESS=$(jq -r '.root.WithdrawManagerProxy' "$addrs")
          export L1_ERC20_PREDICATE_ADDRESS=$(jq -r '.root.predicates.ERC20Predicate' "$addrs")
          export L1_ERC721_PREDICATE_ADDRESS=$(jq -r '.root.predicates.ERC721Predicate' "$addrs")
          export L1_STAKE_MANAGER_PROXY_ADDRESS=$(jq -r '.root.StakeManagerProxy' "$addrs")
          export L1_STAKING_INFO_ADDRESS=$(jq -r '.root.StakingInfo' "$addrs")
          export L1_MATIC_TOKEN_ADDRESS=$(jq -r '.root.tokens.MaticToken' "$addrs")
          export L1_POL_TOKEN_ADDRESS=$(jq -r '.root.tokens.PolToken' "$addrs")
          export L1_ERC20_TOKEN_ADDRESS=$(jq -r '.root.tokens.TestToken' "$addrs")
          export L1_ERC721_TOKEN_ADDRESS=$(jq -r '.root.tokens.RootERC721' "$addrs")
          export L2_ERC20_TOKEN_ADDRESS=$(jq -r '.child.tokens.TestToken' "$addrs")
          export L2_ERC721_TOKEN_ADDRESS=$(jq -r '.child.tokens.RootERC721' "$addrs")
          export L1_WETH_TOKEN_ADDRESS=$(jq -r '.root.tokens.MaticWeth' "$addrs")
          export L2_WETH_TOKEN_ADDRESS=$(jq -r '.child.tokens.MaticWeth' "$addrs")
          export L1_ROOT_CHAIN_MANAGER_PROXY=$(jq -r '.root.posBridge.RootChainManagerProxy' "$addrs")
          export L1_ERC20_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC20PredicateProxy' "$addrs")
          export L1_ERC721_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC721PredicateProxy' "$addrs")
          export L1_ERC1155_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC1155PredicateProxy' "$addrs")
          export L1_ETHER_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.EtherPredicateProxy' "$addrs")
          export L1_DUMMY_ERC20=$(jq -r '.root.posBridge.DummyERC20' "$addrs")
          export L2_DUMMY_ERC20=$(jq -r '.child.posBridge.DummyERC20' "$addrs")
          export L1_DUMMY_ERC721=$(jq -r '.root.posBridge.DummyERC721' "$addrs")
          export L2_DUMMY_ERC721=$(jq -r '.child.posBridge.DummyERC721' "$addrs")
          export L1_DUMMY_ERC1155=$(jq -r '.root.posBridge.DummyERC1155' "$addrs")
          export L2_DUMMY_ERC1155=$(jq -r '.child.posBridge.DummyERC1155' "$addrs")
          export L2_MATIC_WETH=$(jq -r '.child.posBridge.MaticWETH' "$addrs")
          # State receiver lives in the L2 bor genesis config.
          export L2_STATE_RECEIVER_ADDRESS=$(jq -r '.config.bor.stateReceiverContract' "$genesis")
          # Run only the ETH variant of bridge + withdraw.
          bats --filter-tags transaction-eth tests/bridge/pos.bats

      - name: Get tag
        run: echo "TAG=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      - name: Push snapshot image
        run: |
          full_image="ghcr.io/${{ matrix.image_name }}:${{ env.TAG }}"
          docker tag pos-devnet "$full_image"
          docker push "$full_image"
