name: publish-snapshots

# Build snapshot images for each devnet variant, validate end-to-end (extract +
# restore + chain advances), then push to GHCR. Triggered on tag pushes (`v*`)
# or via manual dispatch with a custom tag for testing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to test the workflow
        required: false
        default: vx.y.z-test

concurrency:
  group: publish-snapshots
  cancel-in-progress: false

env:
  ENCLAVE_NAME: pos

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: 0xpolygon/pos-devnet-small
          - image_name: 0xpolygon/pos-devnet-large
            extra_flags: --args-file .github/configs/large.yml.norun

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_token: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy devnet
        run: kurtosis run --enclave=${{ env.ENCLAVE_NAME }} ${{ matrix.extra_flags }} .

      - name: Create snapshot
        run: ./scripts/snapshot/snapshot.sh ${{ env.ENCLAVE_NAME }}

      - name: Verify snapshot image exists
        run: docker image inspect pos-devnet

      # Validate the snapshot end-to-end before publishing so a broken snapshot
      # never ships. Tear down the live enclave, extract the image, restore, and
      # confirm the restored devnet produces blocks.
      - name: Remove the kurtosis enclave
        run: kurtosis enclave rm --force ${{ env.ENCLAVE_NAME }}

      - name: Extract snapshot data
        run: ./scripts/snapshot/extract.sh pos-devnet

      - name: Restore devnet from snapshot
        run: ./scripts/snapshot/restore.sh

      - name: Verify restored devnet produces blocks
        run: |
          target_block=500
          while true; do
            block=$(cast bn --rpc-url localhost:9545)
            echo "L2 block: $block/$target_block"
            if [[ "$block" -ge "$target_block" ]]; then
              echo "Restored devnet is producing blocks!"
              break
            fi
            sleep 5
          done

      - name: Get tag
        run: echo "TAG=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      - name: Push snapshot image
        run: |
          full_image="ghcr.io/${{ matrix.image_name }}:${{ env.TAG }}"
          docker tag pos-devnet "$full_image"
          docker push "$full_image"
