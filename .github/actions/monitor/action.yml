name: monitor
description: |
  Monitor blockchain progress (blocks, milestones, checkpoints, spans) by
  running the devnet-monitor Go binary against either a kurtosis enclave or
  a restored docker-compose devnet.

inputs:
  enclave_name:
    description: The name of the Kurtosis enclave. Ignored when compose_file is set.
    required: false
    default: pos
  compose_file:
    description: |
      Path to a docker-compose.yaml from a restored devnet. When set, the
      monitor resolves URLs from the compose file instead of querying kurtosis.
    required: false
    default: ''
  skip_milestones:
    description: Skip milestone monitoring.
    required: false
    default: 'false'
  skip_checkpoints:
    description: Skip checkpoint monitoring.
    required: false
    default: 'false'
  skip_spans:
    description: Skip span monitoring.
    required: false
    default: 'false'
  target_block:
    description: |
      Absolute Bor block height. When > 0, the bor probe records the wall-clock
      at the first observation of latest >= target_block and appends a
      time-to-block record to emit_timing_path. Used by CI perf monitoring.
    required: false
    default: '0'
  emit_timing_path:
    description: |
      Append-only file path where the time-to-block record is written. Required
      when target_block > 0.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: tools/devnet-monitor/go.mod
        cache-dependency-path: tools/devnet-monitor/go.sum

    - name: Build devnet-monitor
      shell: bash
      working-directory: tools/devnet-monitor
      run: go build -o devnet-monitor .

    - name: Resolve target flag
      id: target
      shell: bash
      run: |
        if [[ -n "${{ inputs.compose_file }}" ]]; then
          echo "flag=--compose-file ${{ inputs.compose_file }}" >> "$GITHUB_OUTPUT"
        elif [[ -n "${{ inputs.enclave_name }}" ]]; then
          echo "flag=--enclave ${{ inputs.enclave_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "either enclave_name or compose_file must be set"
          exit 1
        fi

    - name: Inspect enclave
      if: inputs.compose_file == '' && inputs.enclave_name != ''
      shell: bash
      run: kurtosis enclave inspect ${{ inputs.enclave_name }}

    - name: Set log level
      shell: bash
      run: echo "LOG_LEVEL=DEBUG" >> "$GITHUB_ENV"

    - name: Resolve bor perf flags
      id: bor_perf
      shell: bash
      run: |
        flags=""
        if [[ "${{ inputs.target_block }}" != "0" && -n "${{ inputs.target_block }}" ]]; then
          if [[ -z "${{ inputs.emit_timing_path }}" ]]; then
            echo "target_block is set but emit_timing_path is empty" >&2
            exit 1
          fi
          flags="--target-block ${{ inputs.target_block }} --emit-timing ${{ inputs.emit_timing_path }}"
        fi
        echo "flags=${flags}" >> "$GITHUB_OUTPUT"

    - name: Monitor bor block progress
      shell: bash
      run: tools/devnet-monitor/devnet-monitor bor ${{ steps.target.outputs.flag }} ${{ steps.bor_perf.outputs.flags }}

    - name: Monitor heimdall block progress
      shell: bash
      run: tools/devnet-monitor/devnet-monitor heimdall ${{ steps.target.outputs.flag }}

    - name: Monitor span progress
      if: inputs.skip_spans != 'true'
      shell: bash
      run: tools/devnet-monitor/devnet-monitor spans ${{ steps.target.outputs.flag }}

    - name: Monitor milestone progress
      if: inputs.skip_milestones != 'true'
      shell: bash
      run: tools/devnet-monitor/devnet-monitor milestones ${{ steps.target.outputs.flag }}

    - name: Monitor checkpoint progress
      if: inputs.skip_checkpoints != 'true'
      shell: bash
      run: tools/devnet-monitor/devnet-monitor checkpoints ${{ steps.target.outputs.flag }}
