name: monitor
description: Monitor blockchain progress (blocks, milestones, checkpoints, spans, validators)

inputs:
  enclave_name:
    description: The name of the Kurtosis enclave
    required: false
    default: pos
  skip_milestones:
    description: Skip milestone monitoring
    required: false
    default: 'false'
  skip_checkpoints:
    description: Skip checkpoint monitoring
    required: false
    default: 'false'
  skip_spans:
    description: Skip span monitoring
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Inspect enclave
      shell: bash
      run: kurtosis enclave inspect ${{ inputs.enclave_name }}

    - name: Monitor Bor block progress
      working-directory: .github/actions/monitor
      shell: bash
      run: ./blocks-bor.sh ${{ inputs.enclave_name }}

    - name: Monitor Heimdall block progress
      working-directory: .github/actions/monitor
      shell: bash
      run: ./blocks-heimdall.sh ${{ inputs.enclave_name }}

    - name: Monitor span progress
      if: inputs.skip_spans != 'true'
      working-directory: .github/actions/monitor
      shell: bash
      run: ./spans.sh ${{ inputs.enclave_name }}

    - name: Monitor milestone progress
      if: inputs.skip_milestones != 'true'
      working-directory: .github/actions/monitor
      shell: bash
      run: ./milestones.sh ${{ inputs.enclave_name }}

    - name: Monitor checkpoint progress
      if: inputs.skip_checkpoints != 'true'
      working-directory: .github/actions/monitor
      shell: bash
      run: ./checkpoints.sh ${{ inputs.enclave_name }}
