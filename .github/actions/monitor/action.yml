name: monitor
description: Monitor blockchain progress (blocks, milestones, checkpoints)

inputs:
  docker_network:
    description: Docker network name
    required: false
    default: kt-pos
  skip_milestones:
    description: Skip milestone monitoring
    required: false
    default: 'false'
  skip_checkpoints:
    description: Skip checkpoint monitoring
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: List containers
      shell: bash
      run: docker ps --filter "network=${{ inputs.docker_network }}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

    - name: Monitor block progress
      working-directory: .github/actions/monitor
      shell: bash
      run: ./blocks.sh ${{ inputs.docker_network }}

    - name: Monitor milestone progress
      if: inputs.skip_milestones != 'true'
      working-directory: .github/actions/monitor
      shell: bash
      run: ./milestones.sh ${{ inputs.docker_network }}

    - name: Monitor checkpoint progress
      if: inputs.skip_checkpoints != 'true'
      working-directory: .github/actions/monitor
      shell: bash
      run: ./checkpoints.sh ${{ inputs.docker_network }}
