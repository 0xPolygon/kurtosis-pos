name: test-state-sync
description: |
  Test state sync (POL bridge L1 → L2 via plasma bridge).
  Works against both kurtosis-deployed enclaves (default) and restored
  docker-compose devnets — set compose_file to switch to docker mode.

inputs:
  enclave_name:
    description: The name of the kurtosis enclave (kurtosis mode) or a log label (docker mode)
    required: false
    default: pos
  compose_file:
    description: |
      Path to a docker-compose.yaml from a restored devnet. When set,
      switches the action to docker mode: every env var pos_setup would
      otherwise look up via kurtosis is resolved from compose ports +
      the contractAddresses.json / l2-genesis.json artefacts instead.
    required: false
    default: ''
  l1_rpc:
    description: |
      kurtosis mode only — the service name of the L1 EL to use as the
      RPC endpoint. Ignored when compose_file is set.
    required: false
    default: el-1-geth-lighthouse
  pos_e2e_tag:
    description: The git tag, branch, or commit hash of 0xPolygon/pos-e2e
    required: false
    default: 036860c4ff5d39c52f147a28c4045d9b4f0dc1ff
  pos_e2e_token:
    description: GitHub token with read access to 0xPolygon/pos-e2e
    required: true
  snapshot_folder:
    description: |
      docker mode only — directory containing docker-compose.yaml,
      contractAddresses.json, and l2-genesis.json. Defaults to ./tmp
      (the extract.sh default).
    required: false
    default: ./tmp
  timeout_seconds:
    description: Per-test bats timeout (state sync waits can be slow)
    required: false
    default: '600'

runs:
  using: composite
  steps:
    - name: Clone 0xPolygon/pos-e2e
      uses: actions/checkout@v6
      with:
        repository: 0xPolygon/pos-e2e
        path: pos-e2e
        ref: ${{ inputs.pos_e2e_tag }}
        token: ${{ inputs.pos_e2e_token }}

    - name: Install bats
      uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
      with:
        support-path: ${{ github.workspace }}/lib/bats-support
        assert-path: ${{ github.workspace }}/lib/bats-assert
        detik-path: ${{ github.workspace }}/lib/bats-detik
        file-path: ${{ github.workspace }}/lib/bats-file

    - name: Resolve L1 RPC URL (kurtosis mode)
      if: inputs.compose_file == ''
      shell: bash
      run: |
        if [[ "${{ inputs.l1_rpc }}" == "el-1-geth-lighthouse" ]]; then
          l1_rpc_url="http://$(kurtosis port print ${{ inputs.enclave_name }} el-1-geth-lighthouse rpc)"
        else
          l1_rpc_url="$(kurtosis port print ${{ inputs.enclave_name }} ${{ inputs.l1_rpc }} rpc)"
        fi
        echo "L1_RPC_URL=$l1_rpc_url" >> $GITHUB_ENV
        echo "TIMEOUT_SECONDS=${{ inputs.timeout_seconds }}" >> $GITHUB_ENV

    - name: Resolve test environment from snapshot artifacts (docker mode)
      if: inputs.compose_file != ''
      shell: bash
      run: |
        set -e
        compose="${{ inputs.compose_file }}"
        contract_addresses="${{ github.workspace }}/${{ inputs.snapshot_folder }}/contractAddresses.json"
        l2_genesis="${{ github.workspace }}/${{ inputs.snapshot_folder }}/l2-genesis.json"

        # Resolve host-mapped ports from the restored compose file.
        l1_rpc_port=$(yq -r '.services | to_entries[] | select(.key | test("-el-1-geth-lighthouse$")) | .value.ports[0]' "$compose" | cut -d: -f1)
        l2_rpc_port=$(yq -r '.services | to_entries[] | select(.key | test("-l2-el-1-bor-heimdall-v2-validator$")) | .value.ports[0]' "$compose" | cut -d: -f1)
        l2_cl_api_port=$(yq -r '.services | to_entries[] | select(.key | test("-l2-cl-1-heimdall-v2-bor-validator$")) | .value.ports[0] | split(":")[0]' "$compose")
        {
          echo "ENCLAVE_NAME=${{ inputs.enclave_name }}"
          echo "TIMEOUT_SECONDS=${{ inputs.timeout_seconds }}"
          echo "L1_RPC_URL=http://localhost:${l1_rpc_port}"
          echo "L2_RPC_URL=http://localhost:${l2_rpc_port}"
          echo "L2_CL_API_URL=http://localhost:${l2_cl_api_port}"
          echo "L1_GOVERNANCE_PROXY_ADDRESS=$(jq -r '.root.GovernanceProxy' "$contract_addresses")"
          echo "L1_ROOT_CHAIN_PROXY_ADDRESS=$(jq -r '.root.RootChainProxy' "$contract_addresses")"
          echo "L1_DEPOSIT_MANAGER_PROXY_ADDRESS=$(jq -r '.root.DepositManagerProxy' "$contract_addresses")"
          echo "L1_WITHDRAW_MANAGER_PROXY_ADDRESS=$(jq -r '.root.WithdrawManagerProxy' "$contract_addresses")"
          echo "L1_ERC20_PREDICATE_ADDRESS=$(jq -r '.root.predicates.ERC20Predicate' "$contract_addresses")"
          echo "L1_ERC721_PREDICATE_ADDRESS=$(jq -r '.root.predicates.ERC721Predicate' "$contract_addresses")"
          echo "L1_STAKE_MANAGER_PROXY_ADDRESS=$(jq -r '.root.StakeManagerProxy' "$contract_addresses")"
          echo "L1_STAKING_INFO_ADDRESS=$(jq -r '.root.StakingInfo' "$contract_addresses")"
          echo "L1_MATIC_TOKEN_ADDRESS=$(jq -r '.root.tokens.MaticToken' "$contract_addresses")"
          echo "L1_POL_TOKEN_ADDRESS=$(jq -r '.root.tokens.PolToken' "$contract_addresses")"
          echo "L1_ERC20_TOKEN_ADDRESS=$(jq -r '.root.tokens.TestToken' "$contract_addresses")"
          echo "L1_ERC721_TOKEN_ADDRESS=$(jq -r '.root.tokens.RootERC721' "$contract_addresses")"
          echo "L2_ERC20_TOKEN_ADDRESS=$(jq -r '.child.tokens.TestToken' "$contract_addresses")"
          echo "L2_ERC721_TOKEN_ADDRESS=$(jq -r '.child.tokens.RootERC721' "$contract_addresses")"
          echo "L1_WETH_TOKEN_ADDRESS=$(jq -r '.root.tokens.MaticWeth' "$contract_addresses")"
          echo "L2_WETH_TOKEN_ADDRESS=$(jq -r '.child.tokens.MaticWeth' "$contract_addresses")"
          echo "L1_ROOT_CHAIN_MANAGER_PROXY=$(jq -r '.root.posBridge.RootChainManagerProxy' "$contract_addresses")"
          echo "L1_ERC20_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC20PredicateProxy' "$contract_addresses")"
          echo "L1_ERC721_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC721PredicateProxy' "$contract_addresses")"
          echo "L1_ERC1155_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.ERC1155PredicateProxy' "$contract_addresses")"
          echo "L1_ETHER_BRIDGE_PREDICATE_PROXY=$(jq -r '.root.posBridge.EtherPredicateProxy' "$contract_addresses")"
          echo "L1_DUMMY_ERC20=$(jq -r '.root.posBridge.DummyERC20' "$contract_addresses")"
          echo "L2_DUMMY_ERC20=$(jq -r '.child.posBridge.DummyERC20' "$contract_addresses")"
          echo "L1_DUMMY_ERC721=$(jq -r '.root.posBridge.DummyERC721' "$contract_addresses")"
          echo "L2_DUMMY_ERC721=$(jq -r '.child.posBridge.DummyERC721' "$contract_addresses")"
          echo "L1_DUMMY_ERC1155=$(jq -r '.root.posBridge.DummyERC1155' "$contract_addresses")"
          echo "L2_DUMMY_ERC1155=$(jq -r '.child.posBridge.DummyERC1155' "$contract_addresses")"
          echo "L2_MATIC_WETH=$(jq -r '.child.posBridge.MaticWETH' "$contract_addresses")"
          echo "L2_STATE_RECEIVER_ADDRESS=$(jq -r '.config.bor.stateReceiverContract' "$l2_genesis")"
        } >> "$GITHUB_ENV"

    - name: Test state sync
      working-directory: pos-e2e
      shell: bash
      run: bats --filter 'bridge POL from L1 to L2 via plasma bridge' tests/bridge/plasma.bats
