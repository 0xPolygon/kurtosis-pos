polygon_pos_package:
  participants:
    # Bor validator nodes — 8 validators to allow degrading 5 peers while
    # maintaining milestone voting quorum (3/8 = 37.5% > 33% threshold).
    # Running the psps-wit-improvements branch build which contains the WIT
    # protocol peer lock fix (bor#2120).
    - kind: validator
      count: 8
      el_bor_produce_witness: true
      cl_type: heimdall-v2
      el_type: bor
      el_image: 0xpolygon/bor:2.6.3

    # RPC nodes — same fixed build to validate the fix end-to-end.
    - kind: rpc
      count: 1
      el_bor_sync_with_witness: true
      cl_type: heimdall-v2
      el_type: bor
      el_image: 0xpolygon/bor:2.6.3

    - kind: rpc
      count: 1
      el_bor_sync_with_witness: false
      cl_type: heimdall-v2
      el_type: bor
      el_image: 0xpolygon/bor:2.6.3

    - kind: rpc
      count: 1
      el_bor_sync_with_witness: false
      cl_type: heimdall-v2
      el_type: erigon
      el_image: 0xpolygon/erigon:v3.4.0

    # Bor archive node — fixed build.
    - kind: archive
      count: 1
      cl_type: heimdall-v2
      el_type: bor
      el_image: 0xpolygon/bor:2.6.3
  additional_services:
    - bridge_spammer
    - observability
    - tx_spammer
